<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAG 知识库 · 智能问答</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&family=Source+Sans+3:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--primary:#475569;--secondary:#64748B;--cta:#2563EB;--bg:#F8FAFC;--card:#FFFFFF;--text:#1E293B;--text-muted:#64748B;--border:#E2E8F0;--radius:8px;--sidebar-w:340px}*{margin:0;padding:0;box-sizing:border-box}body{font-family:"Source Sans 3",-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);line-height:1.7;-webkit-font-smoothing:antialiased;display:flex;height:100vh;overflow:hidden}.sidebar{width:var(--sidebar-w);min-width:var(--sidebar-w);background:#FFFFFF;border-right:1px solid var(--border);display:flex;flex-direction:column;padding:20px;overflow-y:auto;z-index:10}.sidebar-logo{display:flex;align-items:center;gap:10px;margin-bottom:20px}.sidebar-logo h1{font-family:"Lexend",sans-serif;font-size:1.05rem;font-weight:600;color:var(--text)}.sidebar-section{margin-bottom:16px}.sidebar-label{font-size:0.68rem;font-weight:600;text-transform:uppercase;letter-spacing:0.05em;color:#94A3B8;margin-bottom:8px}.sidebar input{width:100%;padding:8px 12px;border:1px solid var(--border);border-radius:6px;font-size:0.85rem;font-family:inherit;margin-bottom:8px;transition:border-color .2s ease;outline:none;background:#F8FAFC}.sidebar input:focus{border-color:var(--cta);box-shadow:0 0 0 2px rgba(37,99,235,.12)}.sidebar input[type=password]{font-family:monospace}.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:8px 16px;border-radius:6px;font-size:0.85rem;font-weight:500;cursor:pointer;border:1px solid var(--border);background:#FFFFFF;color:var(--text);transition:all .2s ease;font-family:inherit;width:100%}.btn:hover{border-color:#CBD5E1;box-shadow:0 1px 3px rgba(0,0,0,.06)}.btn-primary{background:var(--cta);color:#FFFFFF;border-color:var(--cta)}.btn-primary:hover{background:#1D4ED8;border-color:#1D4ED8}.btn-sm{padding:6px 12px;font-size:0.78rem;width:auto}.badge{display:inline-flex;align-items:center;gap:6px;padding:4px 12px;border-radius:20px;font-size:0.75rem;font-weight:500}.badge.online{background:#F0FDF4;color:#15803D;border:1px solid #BBF7D0}.badge.offline{background:#FEF2F2;color:#DC2626;border:1px solid #FECACA}.badge .dot{width:7px;height:7px;border-radius:50%;display:inline-block}.badge.online .dot{background:#22C55E}.badge.offline .dot{background:#EF4444}.status-row{display:flex;align-items:center;gap:10px;margin-bottom:16px}.file-area{border:1.5px dashed #CBD5E1;border-radius:6px;padding:16px;text-align:center;cursor:pointer;transition:all .2s ease;margin-bottom:8px;background:#F8FAFC}.file-area:hover{border-color:#94A3B8;background:#F1F5F9}.file-area input{display:none}.file-area p{font-size:0.82rem;color:var(--text-muted)}.file-list{font-size:0.78rem;color:var(--text-muted);margin-bottom:8px;max-height:80px;overflow-y:auto}.main{flex:1;display:flex;flex-direction:column;min-width:0}.chat-area{flex:1;overflow-y:auto;padding:24px 32px}.welcome{text-align:center;padding:60px 24px;color:var(--text-muted);margin:auto}.welcome svg{margin-bottom:16px}.welcome h2{font-family:"Lexend",sans-serif;font-size:1.15rem;color:var(--primary);margin-bottom:8px}.welcome p{font-size:0.85rem;line-height:1.7;max-width:400px;margin:0 auto}.msg{margin-bottom:16px;animation:fadeIn .3s ease;max-width:800px}.msg.user{align-self:flex-end}.msg.assistant{align-self:flex-start}.msg-content{padding:14px 18px;border-radius:8px;font-size:0.9rem;line-height:1.7}.msg.user .msg-content{background:var(--cta);color:#FFFFFF;box-shadow:0 1px 3px rgba(37,99,235,.2)}.msg.assistant .msg-content{background:var(--card);border:1px solid var(--border);box-shadow:0 1px 2px rgba(0,0,0,.04)}.msg-role{font-size:0.72rem;font-weight:600;color:var(--text-muted);margin-bottom:4px;padding:0 4px}.msg.user .msg-role{text-align:right}@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}.sources-toggle{font-size:0.78rem;color:var(--cta);cursor:pointer;padding:4px 0;margin-top:6px;display:inline-flex;align-items:center;gap:4px;user-select:none}.sources-toggle:hover{text-decoration:underline}.sources-list{display:none;margin-top:8px}.sources-list.open{display:block}.source-card{background:var(--card);border:1px solid var(--border);border-left:3px solid var(--primary);border-radius:6px;padding:10px 14px;margin:6px 0;font-size:0.78rem}.source-card .src-header{font-weight:600;color:var(--text);margin-bottom:4px;font-size:0.75rem;display:flex;align-items:center;gap:6px}.source-card .src-body{color:var(--text-muted);line-height:1.6}.input-area{padding:16px 32px 24px;border-top:1px solid var(--border);background:#FFFFFF}.input-row{display:flex;gap:10px;align-items:flex-end;max-width:800px;margin:0 auto}.input-row textarea{flex:1;padding:10px 14px;border:1px solid var(--border);border-radius:8px;font-size:0.9rem;font-family:inherit;resize:none;outline:none;transition:border-color .2s ease;min-height:44px;max-height:120px;line-height:1.5}.input-row textarea:focus{border-color:var(--cta);box-shadow:0 0 0 2px rgba(37,99,235,.12)}.input-row .btn{width:auto;padding:10px 20px;white-space:nowrap}.cursor::after{content:"";display:inline-block;width:2px;height:1em;background:var(--cta);margin-left:2px;vertical-align:text-bottom;animation:blink 1s step-end infinite}@keyframes blink{50%{opacity:0}}@media(max-width:768px){.sidebar{display:none}.sidebar.open{display:flex;position:fixed;top:0;left:0;height:100%;z-index:100}.chat-area{padding:16px}.input-area{padding:12px 16px}.mobile-toggle{display:flex;position:fixed;top:12px;left:12px;z-index:200;width:36px;height:36px;background:var(--card);border:1px solid var(--border);border-radius:6px;align-items:center;justify-content:center;cursor:pointer}}@media(min-width:769px){.mobile-toggle{display:none}}.toast{position:fixed;bottom:24px;right:24px;z-index:999;padding:12px 20px;border-radius:8px;font-size:0.85rem;font-weight:500;box-shadow:0 4px 12px rgba(0,0,0,.15);animation:slideUp .3s ease;max-width:360px}.toast.success{background:#F0FDF4;color:#15803D;border:1px solid #BBF7D0}.toast.error{background:#FEF2F2;color:#DC2626;border:1px solid #FECACA}@keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
</style>
</head>
<body>
<button class="mobile-toggle" onclick="toggleSidebar()"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#475569" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
<aside class="sidebar" id="sidebar">
  <div class="sidebar-logo"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#475569" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/><line x1="8" y1="7" x2="16" y2="7"/><line x1="8" y1="11" x2="14" y2="11"/></svg><h1>RAG 知识库</h1></div>
  <div class="status-row"><span class="badge online" id="statusBadge"><span class="dot"></span><span id="statusText">检测中...</span></span><button class="btn btn-sm" onclick="checkHealth()" style="width:auto">↻</button></div>
  <div class="sidebar-section"><div class="sidebar-label">API 配置</div><input type="password" id="apiKey" placeholder="API Key (sk-...)"><input type="text" id="apiBase" placeholder="https://api.deepseek.com" value="https://api.deepseek.com"><input type="text" id="apiModel" placeholder="deepseek-chat" value="deepseek-chat"><p style="font-size:0.72rem;color:#94A3B8;text-align:center">填入您自己的 API Key</p></div>
  <div class="sidebar-section"><div class="sidebar-label">文档上传</div><div class="file-area" id="fileArea" onclick="document.getElementById('fileInput').click()"><div class="file-icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#94A3B8" stroke-width="1.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg></div><p>点击选择文件</p><p style="font-size:0.75rem">PDF / Word / MD / TXT</p></div><input type="file" id="fileInput" multiple accept=".pdf,.docx,.doc,.md,.txt" onchange="onFilesSelected(event)"><div class="file-list" id="fileList"></div><button class="btn btn-primary" id="uploadBtn" onclick="uploadFiles()" disabled>上传并索引</button></div>
  <div class="sidebar-section"><div class="sidebar-label">会话</div><div style="display:flex;gap:8px"><button class="btn btn-sm" onclick="newSession()">新建会话</button><button class="btn btn-sm" onclick="clearChat()">清空对话</button></div></div>
</aside>
<main class="main">
  <div class="chat-area" id="chatArea">
    <div class="welcome" id="welcomeMsg"><svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#94A3B8" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="5"/><path d="M20 21a8 8 0 0 0-16 0"/></svg><h2>欢迎使用 RAG 知识库</h2><p>在左侧填入您的 API Key，上传文档，然后开始提问。<br>所有回答都将附带引用来源。</p></div>
  </div>
  <div class="input-area"><div class="input-row"><textarea id="queryInput" rows="1" placeholder="输入您的问题..." onkeydown="handleKeyDown(event)"></textarea><button class="btn btn-primary" onclick="sendQuery()" id="sendBtn">发送</button></div></div>
</main>
<div id="toastContainer"></div>
<script>
let messages=[],sessionId="default",selectedFiles=[],isStreaming=!1;
function toggleSidebar(){document.getElementById("sidebar").classList.toggle("open")}
function onFilesSelected(e){selectedFiles=Array.from(e.target.files);var l=document.getElementById("fileList");l.innerHTML=selectedFiles.map(function(f){return '<div class="file-item">📄'+f.name+"</div>"}).join("");document.getElementById("uploadBtn").disabled=!selectedFiles.length}
async function uploadFiles(){if(!selectedFiles.length)return;var k=document.getElementById("apiKey").value.trim(),b=document.getElementById("apiBase").value.trim()||"https://api.deepseek.com";if(!k){toast("请先填入 API Key","error");return}var btn=document.getElementById("uploadBtn");btn.disabled=!0;btn.textContent="处理中...";try{var fd=new FormData();fd.append("api_key",k);fd.append("api_base",b);selectedFiles.forEach(function(f){fd.append("files",f)});var resp=await fetch("/api/upload",{method:"POST",body:fd}),data=await resp.json();resp.ok&&data.success?toast("已索引 "+data.chunkCount+" 个文本块","success"):toast(data.error||"上传失败","error");selectedFiles=[];document.getElementById("fileList").innerHTML="";document.getElementById("fileInput").value=""}catch(e){toast("上传失败: "+e.message,"error")}finally{btn.disabled=!1;btn.textContent="上传并索引"}}
async function checkHealth(){try{var r=await fetch("/api/health"),d=await r.json(),b=document.getElementById("statusBadge"),t=document.getElementById("statusText");d.ready?(b.className="badge online",t.textContent="服务就绪"):(b.className="badge offline",t.textContent="未就绪")}catch(e){document.getElementById("statusBadge").className="badge offline";document.getElementById("statusText").textContent="未连接"}}
async function sendQuery(){if(isStreaming)return;var inp=document.getElementById("queryInput"),prompt=inp.value.trim();if(!prompt)return;var ak=document.getElementById("apiKey").value.trim(),ab=document.getElementById("apiBase").value.trim()||"https://api.deepseek.com",am=document.getElementById("apiModel").value.trim()||"deepseek-chat";if(!ak){toast("请先填入 API Key","error");return}inp.value="";inp.style.height="auto";isStreaming=!0;document.getElementById("sendBtn").disabled=!0;var w=document.getElementById("welcomeMsg");w&&(w.style.display="none");addMsg("user",prompt);var amsg=addMsg("assistant","",!0),cd=amsg.querySelector(".msg-content");try{var resp=await fetch("/api/query/stream",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({query:prompt,session_id:sessionId,top_k:5,api_key:ak,api_base:ab,model:am})});if(!resp.ok){cd.textContent="请求失败 ("+resp.status+")";isStreaming=!1;document.getElementById("sendBtn").disabled=!1;return}var full="",sources=[],reader=resp.body.getReader(),decoder=new TextDecoder(),buffer="";while(1){var rv=await reader.read();if(rv.done)break;buffer+=decoder.decode(rv.value,{stream:!0});var lines=buffer.split("\n");buffer=lines.pop()||"";var ce=null;for(var i=0;i<lines.length;i++){var line=lines[i].trim();if(!line)continue;if(line.startsWith("event:"))ce=line.slice(6).trim()||"token";else if(line.startsWith("data:")){var payload=line.slice(5).trim();if(payload.startsWith('"')&&payload.endsWith('"'))payload=JSON.parse(payload);if(ce==="meta"){try{var meta=JSON.parse(payload);sources=meta.sources||[]}catch(e){}}else if(ce==="token"){full+=payload;cd.innerHTML=renderMD(full)+'<span class="cursor"></span>';scrollBottom()}}}}cd.innerHTML=renderMD(full||"未能生成回答。");sources.length>0&&addSources(amsg,sources)}catch(e){cd.textContent="错误: "+e.message}finally{isStreaming=!1;document.getElementById("sendBtn").disabled=!1;document.getElementById("queryInput").focus()}}
function addMsg(role,content,streaming){var ca=document.getElementById("chatArea"),div=document.createElement("div");div.className="msg "+role;var rl=role==="user"?"你":"AI";div.innerHTML='<div class="msg-role">'+rl+'</div><div class="msg-content">'+(streaming?'<span class="cursor"></span>':renderMD(content))+"</div>";ca.appendChild(div);scrollBottom();return div}
function addSources(msgDiv,sources){var cd=msgDiv.querySelector(".msg-content"),sd=document.createElement("div"),html='<div class="sources-toggle" onclick="this.nextElementSibling.classList.toggle(\'open\')">📎 引用来源 ('+sources.length+') ▾</div><div class="sources-list">';sources.forEach(function(s,i){var fn=s.filename||"未知",pg=s.page?'<span style="margin-left:6px;background:#F1F5F9;color:#475569;padding:1px 8px;border-radius:10px;font-size:0.68rem">第'+s.page+"页</span>":"",snip=(s.content||"").slice(0,250);html+='<div class="source-card"><div class="src-header">['+(i+1)+"] "+fn+pg+'</div><div class="src-body">'+escHtml(snip)+"…</div></div>"});html+="</div>";sd.innerHTML=html;cd.appendChild(sd)}
function renderMD(t){if(!t)return"";t=t.replace(/\*\*(.+?)\*\*/g,"<strong>$1</strong>");t=t.replace(/^[\s]*[-*•]\s+(.+)/gm,"• $1");t=t.replace(/\n\n/g,"<br><br>");t=t.replace(/\n/g,"<br>");t=t.replace(/`(.+?)`/g,'<code style="background:#F1F5F9;padding:1px 5px;border-radius:3px;font-size:0.88em">$1</code>');return t}
function escHtml(t){var d=document.createElement("div");d.textContent=t;return d.innerHTML}
function handleKeyDown(e){if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();sendQuery()}}
document.getElementById("queryInput").addEventListener("input",function(){this.style.height="auto";this.style.height=Math.min(this.scrollHeight,120)+"px"});
function scrollBottom(){var ca=document.getElementById("chatArea");ca.scrollTop=ca.scrollHeight}
function newSession(){sessionId="session_"+Date.now();messages=[];document.getElementById("chatArea").innerHTML='<div class="welcome"><svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#94A3B8" stroke-width="1.2"><circle cx="12" cy="8" r="5"/><path d="M20 21a8 8 0 0 0-16 0"/></svg><h2>新会话已创建</h2><p>上传文档，开始提问。</p></div>'}
function clearChat(){messages=[];document.getElementById("chatArea").innerHTML='<div class="welcome"><svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#94A3B8" stroke-width="1.2"><circle cx="12" cy="8" r="5"/><path d="M20 21a8 8 0 0 0-16 0"/></svg><h2>欢迎使用 RAG 知识库</h2><p>在左侧填入您的 API Key，上传文档，然后开始提问。</p></div>'}
function toast(msg,type){var c=document.getElementById("toastContainer"),d=document.createElement("div");d.className="toast "+(type||"success");d.textContent=msg;c.appendChild(d);setTimeout(function(){d.remove()},3000)}
checkHealth();
</script>
</body>
</html>
